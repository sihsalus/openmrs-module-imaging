name: Unit Tests + Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      central_deployment_id:
        description: "Validated Central deployment ID to publish"
        required: false
        type: string
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 8
          cache: maven

      - name: Compile Imaging
        run: mvn -B clean package -DskipTests

      - name: Run API tests
        run: mvn -B -pl api test

      - name: Upload Jacoco coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-jacoco-report
          path: api/target/site/jacoco

  publish:
    runs-on: ubuntu-latest
    needs: compile
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip publish]')
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 8
          cache: maven

      - name: Check associated merged PR
        id: merged-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_COUNT=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[] | select(.merged_at != null)] | length')
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Commit is associated with a merged pull request."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Commit is not associated with a merged pull request; skipping publish."
          fi

      - name: Set up Maven Central credentials
        if: steps.merged-pr.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 8
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Check Maven Central version
        id: central-version
        if: steps.merged-pr.outputs.exists == 'true'
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          URL="https://repo1.maven.org/maven2/io/github/proyecto-santaclotilde/imaging-omod/${VERSION}/imaging-omod-${VERSION}.pom"
          if curl -fsI "$URL" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists in Maven Central; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is not in Maven Central; publishing."
          fi

      - name: Publish to Maven Central
        if: >-
          steps.merged-pr.outputs.exists == 'true' &&
          steps.central-version.outputs.exists == 'false'
        run: mvn -B -P release deploy -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-validated-deployment:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.central_deployment_id != ''
    permissions:
      contents: read

    steps:
      - name: Publish validated Central deployment
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          CENTRAL_DEPLOYMENT_ID: ${{ inputs.central_deployment_id }}
        run: |
          AUTH_TOKEN=$(printf "%s:%s" "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 -w0)
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${AUTH_TOKEN}" \
            "https://central.sonatype.com/api/v1/publisher/deployment/${CENTRAL_DEPLOYMENT_ID}"
